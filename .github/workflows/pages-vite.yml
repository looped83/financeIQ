name: Pages (Vite build) — Phase 0 proof of concept

# Manual trigger only. This does NOT replace the current GitHub Pages
# deployment — that keeps running exactly as before via the repo's
# "Deploy from a branch" Pages source setting. This workflow only takes
# over once someone deliberately switches the Pages source to
# "GitHub Actions" in repo settings (the Phase 5 cutover step in the
# V2 migration plan). Until then it's inert and safe to keep around.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
