name: Pages (Vite build)

# Phase 5 cutover: index.html now loads its logic from a built src/ bundle
# (src/main.ts), so it needs this workflow to actually build it before
# deploying — the old "Deploy from a branch" Pages source would just ship
# the raw, unbuilt index.html and a broken page. This workflow only takes
# effect once the repo's Pages source is switched to "GitHub Actions" in
# repo settings (Settings → Pages → Source) — a manual step outside of
# what this workflow file itself can do. Until that switch happens, this
# still runs (e.g. via workflow_dispatch) but doesn't affect what's live.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
